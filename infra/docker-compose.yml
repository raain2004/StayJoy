version: '3.8'

services:
  # --- Next.js Dashboard ---
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - redis

  # --- n8n Workflow Automation ---
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${PUBLIC_IP:-localhost}:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-stayjoy2024}
      - N8N_SECURE_COOKIE=false
      # Concurrency: cho phép 20 workflow chạy song song
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=20
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_TIMEOUT=60
      - EXECUTIONS_TIMEOUT_MAX=120
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  # --- Chatwoot ---
  chatwoot-web:
    image: chatwoot/chatwoot:latest
    ports:
      - "3001:3000"
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY:-replace_with_random_64_char_string}
      - FRONTEND_URL=https://chat.stayjoy.io.vn
      - DATABASE_URL=postgres://chatwoot:chatwoot@chatwoot-postgres:5432/chatwoot_production
      - REDIS_URL=redis://redis:6379
      - RAILS_LOG_TO_STDOUT=true
      - FB_APP_ID=26218463624451186
      - FB_APP_SECRET=ae962566e0b2ca743e48341db0ab7154
      - FB_VERIFY_TOKEN=StayJoyVerify2026
      - IG_VERIFY_TOKEN=StayJoyVerify2026
    depends_on:
      - chatwoot-postgres
      - redis
    entrypoint: ["/bin/sh", "-c"]
    command: ["bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"]
    restart: unless-stopped

  chatwoot-worker:
    image: chatwoot/chatwoot:latest
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY:-replace_with_random_64_char_string}
      - DATABASE_URL=postgres://chatwoot:chatwoot@chatwoot-postgres:5432/chatwoot_production
      - REDIS_URL=redis://redis:6379
    extra_hosts:
      - "app.stayjoy.io.vn:host-gateway"
    depends_on:
      - chatwoot-postgres
      - redis
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: unless-stopped

  # --- Chatwoot PostgreSQL ---
  chatwoot-postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=chatwoot
      - POSTGRES_PASSWORD=chatwoot
      - POSTGRES_DB=chatwoot_production
    volumes:
      - chatwoot_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Redis (shared by Chatwoot + n8n) ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  n8n_data:
  chatwoot_pg_data:
  redis_data:
